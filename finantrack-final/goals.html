<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FinanTrack 360 — Metas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .goal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .goal-card{background:var(--white);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
    .goal-card-header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .goal-icon-box{width:48px;height:48px;border-radius:14px;background:var(--green-xlight);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .goal-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--text)}
    .goal-date{font-size:12px;color:var(--muted);margin-top:2px}
    .goal-pct{margin-left:auto;font-size:22px;font-weight:700;color:var(--text)}
    .goal-amounts{display:flex;justify-content:space-between;font-size:13px;margin-top:10px}
    .goal-amounts strong{color:var(--text)}
    .goal-amounts span{color:var(--muted)}
    .goal-actions{display:flex;gap:8px;margin-top:14px}
  </style>
</head>
<body>

<!-- Hamburger -->
<button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menú">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">💰</div>
      <div><div class="logo-name">Finan<span>Track</span> 360</div><div class="logo-version">v1.0.0</div></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
    <a href="dashboard.html" class="nav-link ">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Dashboard
    </a>
    <a href="transactions.html" class="nav-link ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Transacciones
    </a>
    <div class="nav-section-label">Finanzas</div>
    <a href="goals.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Metas
    </a>
    <a href="budgets.html" class="nav-link ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Presupuesto
    </a>
    <div class="nav-section-label">Innovación</div>
    <a href="chat.html" class="nav-link ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Asesor IA
    </a>
    <a href="#" class="nav-link" onclick="openHistoryPanel();return false;" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Alertas
      <span id="sidebar-alert-badge" style="display:none;margin-left:auto;background:#e8705e;color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:Outfit,sans-serif;align-items:center;justify-content:center;min-width:20px;text-align:center">0</span>
    </a>
    <div class="nav-section-label">Cuenta</div>
    <a href="settings.html" class="nav-link ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Configuración
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="user-card">
      <div class="user-avatar" id="userInitial">A</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">—</div>
        <div class="user-email" id="sidebarEmail">—</div>
      </div>
      <span class="user-logout" onclick="signOut()" title="Cerrar sesión">⏻</span>
    </div>
  </div>
</aside>

<div class="main-wrap">
  <header class="topbar">
    <div class="topbar-title">Metas Financieras</div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openNewModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva meta
      </button>
    </div>
  </header>
  <main class="page-content page-enter">
    <div class="card" style="margin-bottom:24px;background:var(--sidebar-bg);border-color:transparent">
      <div class="card-body" style="display:flex;gap:40px;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px">Progreso total</div>
          <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:700;color:#fff;line-height:1" id="totalPct">0%</div>
        </div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px">
            <span id="totalSaved">$0 ahorrados</span><span id="totalTarget">$0 objetivo</span>
          </div>
          <div style="height:10px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden">
            <div id="mainBar" style="height:100%;background:var(--green-mid);border-radius:999px;transition:width .6s;width:0%"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="goal-grid" id="goalGrid">
      <div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⏳</div><p>Cargando...</p></div>
    </div>
  </main>
</div>

<!-- MODAL NUEVA META -->
<div class="modal-overlay" id="newGoalModal">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title">Nueva Meta</h3><button class="modal-close" onclick="closeNewModal()">✕</button></div>
    <div class="modal-body">
      <div class="alert alert-error" id="newGoalError"></div>
      <div class="form-row cols-2">
        <div class="form-group"><label>Nombre</label><input type="text" id="gName" placeholder="Fondo de emergencia"/></div>
        <div class="form-group"><label>Ícono</label><input type="text" id="gIcon" placeholder="🎯" maxlength="2"/></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label>Monto objetivo ($)</label><input type="number" id="gTarget" placeholder="10000" min="1"/></div>
        <div class="form-group"><label>Monto actual ($)</label><input type="number" id="gCurrent" placeholder="0" min="0"/></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label>Fecha objetivo</label><input type="date" id="gDate"/></div>
        <div class="form-group"><label>Color</label><input type="color" id="gColor" value="#5a7d50" style="height:43px;padding:4px"/></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-secondary" onclick="closeNewModal()">Cancelar</button>
        <button class="btn btn-primary" id="saveGoalBtn" onclick="saveGoal()">Guardar meta</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ABONAR -->
<div class="modal-overlay" id="abonarModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h3 class="modal-title">Abonar a meta</h3><button class="modal-close" onclick="closeAbonarModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--muted);margin-bottom:6px">Meta:</p>
      <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px" id="abonarGoalName">—</p>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:16px">
        <span>Actual: <strong id="abonarCurrent" style="color:var(--green)">$0</strong></span>
        <span>Objetivo: <strong id="abonarTarget" style="color:var(--text)">$0</strong></span>
      </div>
      <div class="alert alert-error" id="abonarError"></div>
      <div class="form-group" style="margin-bottom:16px">
        <label>¿Cuánto quieres abonar? ($)</label>
        <input type="number" id="abonarAmount" placeholder="Ej: 500" min="1" step="1"/>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeAbonarModal()">Cancelar</button>
        <button class="btn btn-primary" id="saveAbonarBtn" onclick="saveAbono()">Abonar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="alerts.js"></script>
<script>
  const fmt = n => '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:0});
  let selectedGoal = null;

  async function load(){
    const session = await requireAuth(); if(!session) return;
    const {data:profile} = await getProfile();
    const name = profile?.full_name || session.user.email;
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarEmail').textContent = session.user.email;
    document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();

    const {data:goals} = await getGoals();
    const grid = document.getElementById('goalGrid');
    if(!goals?.length){
      grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎯</div><p>No tienes metas aún.<br>Usa el botón de arriba para crear la primera.</p></div>';
      return;
    }

    const totalSaved  = goals.reduce((s,g)=>s+Number(g.current_amount),0);
    const totalTarget = goals.reduce((s,g)=>s+Number(g.target_amount),0);
    const pct = totalTarget>0 ? Math.round((totalSaved/totalTarget)*100) : 0;
    document.getElementById('totalPct').textContent   = pct+'%';
    document.getElementById('totalSaved').textContent = fmt(totalSaved)+' ahorrados';
    document.getElementById('totalTarget').textContent= fmt(totalTarget)+' objetivo';
    document.getElementById('mainBar').style.width    = Math.min(pct,100)+'%';

    grid.innerHTML = goals.map(g => {
      const p     = g.target_amount>0 ? Math.min(Math.round((g.current_amount/g.target_amount)*100),100) : 0;
      const color = g.color||'#5a7d50';
      const date  = g.target_date ? new Date(g.target_date+'T00:00:00').toLocaleDateString('es-MX',{month:'short',year:'numeric'}) : '—';
      const done  = p >= 100;
      return `<div class="goal-card">
        <div class="goal-card-header">
          <div class="goal-icon-box">${g.icon||'🎯'}</div>
          <div><div class="goal-name">${g.name}</div><div class="goal-date">${date}</div></div>
          <div class="goal-pct" style="color:${done?'var(--green)':color}">${p}%</div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${color}"></div></div>
        <div class="goal-amounts"><strong>${fmt(g.current_amount)}</strong><span>de ${fmt(g.target_amount)}</span></div>
        <div class="goal-actions">
          ${done
            ? `<span class="btn btn-secondary btn-sm" style="flex:1;justify-content:center;color:var(--green)">✅ Completada</span>`
            : `<button class="btn btn-primary btn-sm" style="flex:1" onclick="openAbonarModal('${g.id}','${g.name}',${g.current_amount},${g.target_amount})">+ Abonar</button>`
          }
          <button class="btn btn-danger btn-sm" onclick="deleteGoal('${g.id}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Nueva meta ──
  function openNewModal(){ document.getElementById('newGoalModal').classList.add('open'); }
  function closeNewModal(){ document.getElementById('newGoalModal').classList.remove('open'); }

  async function saveGoal(){
    const name           = document.getElementById('gName').value.trim();
    const icon           = document.getElementById('gIcon').value||'🎯';
    const target_amount  = parseFloat(document.getElementById('gTarget').value);
    const current_amount = parseFloat(document.getElementById('gCurrent').value)||0;
    const target_date    = document.getElementById('gDate').value||null;
    const color          = document.getElementById('gColor').value;
    const errEl = document.getElementById('newGoalError'); errEl.classList.remove('show');
    if(!name){errEl.textContent='Ingresa un nombre.';errEl.classList.add('show');return;}
    if(!target_amount||target_amount<=0){errEl.textContent='Ingresa un monto objetivo válido.';errEl.classList.add('show');return;}
    const btn=document.getElementById('saveGoalBtn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Guardando...';
    const {error}=await addGoal({name,icon,target_amount,current_amount,target_date,color});
    btn.disabled=false; btn.innerHTML='Guardar meta';
    if(error){errEl.textContent='Error: '+error.message;errEl.classList.add('show');return;}
    closeNewModal(); load();
  }

  // ── Abonar ──
  function openAbonarModal(id, name, current, target){
    selectedGoal = {id, name, current: Number(current), target: Number(target)};
    document.getElementById('abonarGoalName').textContent = name;
    document.getElementById('abonarCurrent').textContent  = fmt(current);
    document.getElementById('abonarTarget').textContent   = fmt(target);
    document.getElementById('abonarAmount').value = '';
    document.getElementById('abonarError').classList.remove('show');
    document.getElementById('abonarModal').classList.add('open');
  }
  function closeAbonarModal(){ document.getElementById('abonarModal').classList.remove('open'); selectedGoal=null; }

  async function saveAbono(){
    const abono = parseFloat(document.getElementById('abonarAmount').value);
    const errEl = document.getElementById('abonarError'); errEl.classList.remove('show');
    if(!abono||abono<=0){errEl.textContent='Ingresa un monto válido.';errEl.classList.add('show');return;}
    const nuevo = selectedGoal.current + abono;
    const btn=document.getElementById('saveAbonarBtn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Guardando...';
    const {error} = await _supabase.from('goals').update({current_amount: nuevo}).eq('id', selectedGoal.id);
    btn.disabled=false; btn.innerHTML='Abonar';
    if(error){errEl.textContent='Error: '+error.message;errEl.classList.add('show');return;}
    closeAbonarModal();
    showGoalAlert(selectedGoal.name, nuevo, selectedGoal.target);
    load();
  }

  async function deleteGoal(id){
    if(!confirm('¿Eliminar esta meta?')) return;
    await _supabase.from('goals').delete().eq('id',id);
    load();
  }

  document.getElementById('newGoalModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeNewModal();});
  document.getElementById('abonarModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAbonarModal();});
  load();
</script>
</body>
</html>
